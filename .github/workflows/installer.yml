name: Build Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/UpsStatusWidget.csproj

      - name: Publish x64
        run: >
          dotnet publish src/UpsStatusWidget.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish/x64

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/ups-status-widget.iss
          options: /DMyAppVersion=${{ github.ref_name }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: UPS-Status-Widget-installer
          path: publish/installer/*.exe
          retention-days: 30

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/installer/*.exe
          draft: false
          prerelease: false

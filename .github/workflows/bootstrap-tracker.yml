name: Bootstrap Tracker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - TODO.md
      - .github/tracker/seed-issues.json
      - .github/workflows/bootstrap-tracker.yml

permissions:
  contents: read
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure milestone and seed issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const milestoneTitle = 'v2.0.0';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner, repo, state: 'open', per_page: 100
            });
            let milestone = milestones.find(m => m.title === milestoneTitle);

            if (!milestone) {
              milestone = (await github.rest.issues.createMilestone({
                owner, repo, title: milestoneTitle,
                description: 'Bootstrap milestone for ups-status-widget cleanup and release readiness'
              })).data;
              core.info(`Created milestone ${milestoneTitle}`);
            } else {
              core.info(`Milestone exists: ${milestoneTitle}`);
            }

            const seed = JSON.parse(fs.readFileSync('.github/tracker/seed-issues.json', 'utf8'));
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', per_page: 100
            });
            const openTitles = new Set(existing.filter(i => !i.pull_request).map(i => i.title));

            for (const item of seed) {
              if (openTitles.has(item.title)) {
                core.info(`Issue exists: ${item.title}`);
                continue;
              }
              await github.rest.issues.create({
                owner,
                repo,
                title: item.title,
                body: item.body,
                labels: item.labels,
                milestone: milestone.number
              });
              core.info(`Created issue: ${item.title}`);
            }

name: Feature request
description: Propose an improvement or new capability
title: "feat: "
labels:
  - enhancement
  - needs-triage
body:
  - type: input
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe behavior, UX, and constraints
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2

name: Bug report
description: Report a reproducible defect
title: "bug: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please provide enough details to reproduce.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: v2.0.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 10/11 build
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (redacted)
      render: text
